<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #06080c;
            --bg-card: #0d1117;
            --border: rgba(255,255,255,0.06);
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-dim: #484f58;
            --primary: #6C9CFF;
            --accent-purple: #c084fc;
            --accent-green: #4ade80;
            --accent-cyan: #22d3ee;
            --accent-orange: #fb923c;
            --accent-pink: #f472b6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Input area */
        .input-area {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6, 8, 12, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        .input-field {
            flex: 1;
            min-width: 0;
        }
        .input-field input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 20px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field input:focus { border-color: var(--primary); }
        .input-field input::placeholder { color: var(--text-dim); font-weight: 400; font-size: 16px; }

        /* Dial selector */
        .dial-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .dial-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            min-width: 90px;
            justify-content: center;
        }
        .dial-btn:hover { border-color: var(--text-dim); }
        .dial-btn.open { border-color: var(--primary); background: rgba(108,156,255,0.08); }
        .dial-arrow {
            font-size: 10px;
            transition: transform 0.2s;
        }
        .dial-btn.open .dial-arrow { transform: rotate(180deg); }

        /* Dropdown */
        .dial-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            width: 260px;
            max-height: 400px;
            overflow-y: auto;
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 200;
            padding: 6px;
        }
        .dial-menu.show { display: block; }
        .dial-menu::-webkit-scrollbar { width: 6px; }
        .dial-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .dial-group-label {
            padding: 8px 10px 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }
        .dial-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.1s;
            font-size: 13px;
            color: var(--text-muted);
        }
        .dial-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .dial-item.active { background: rgba(108,156,255,0.1); color: var(--primary); }
        .dial-item-symbol {
            font-family: monospace;
            font-weight: 600;
            min-width: 36px;
            color: var(--text);
        }

        /* Category tabs */
        .cat-tabs {
            display: flex;
            gap: 4px;
            padding: 10px 0 0;
            overflow-x: auto;
            scrollbar-width: none;
            max-width: 600px;
            margin: 0 auto;
        }
        .cat-tabs::-webkit-scrollbar { display: none; }
        .cat-tab {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .cat-tab:hover { background: rgba(255,255,255,0.04); color: var(--text-muted); }
        .cat-tab.active { background: rgba(108,156,255,0.12); border-color: var(--primary); color: var(--primary); font-weight: 600; }

        /* Results table */
        .results {
            margin-top: 16px;
        }
        .result-group {
            margin-bottom: 16px;
        }
        .result-group-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0 4px 6px;
        }
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .result-row {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            transition: background 0.1s;
            cursor: pointer;
        }
        .result-row:hover { background: rgba(255,255,255,0.02); }
        .result-row:not(:last-child) { border-bottom: 1px solid var(--border); }
        .result-row.source { background: rgba(108,156,255,0.04); }
        .result-unit {
            min-width: 70px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .result-value {
            flex: 1;
            text-align: right;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        .result-value.source-val { color: var(--primary); }
        .result-symbol {
            min-width: 44px;
            text-align: right;
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 8px;
        }

        /* Copied toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--accent-green);
            color: #000;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-dim);
            font-size: 11px;
        }
        .footer a { color: var(--primary); text-decoration: none; }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Unit Converter</h1>
            <p>数値を入力すると全単位に一括変換</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row" style="max-width:600px;margin:0 auto;">
            <div class="input-field">
                <input type="number" id="numInput" placeholder="数値を入力" inputmode="decimal" step="any">
            </div>
            <div class="dial-wrap">
                <button class="dial-btn" id="dialBtn">
                    <span id="dialLabel">mm</span>
                    <span class="dial-arrow">▼</span>
                </button>
                <div class="dial-menu" id="dialMenu"></div>
            </div>
        </div>
        <div class="cat-tabs" id="catTabs"></div>
    </div>

    <div class="container">
        <div class="results" id="results"></div>
        <div class="footer">
            Made by <a href="https://mochi-bullet-magazine.vercel.app/" target="_blank">MochiBullet</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    // === State ===
    let activeCat = 'length';
    let activeUnit = 'mm';

    // === Temperature conversion (special) ===
    function tempConvert(value, from, to) {
        // Convert to Celsius first
        let c;
        if (from === 'C') c = value;
        else if (from === 'F') c = (value - 32) * 5 / 9;
        else if (from === 'K') c = value - 273.15;
        // Convert from Celsius to target
        if (to === 'C') return c;
        if (to === 'F') return c * 9 / 5 + 32;
        if (to === 'K') return c + 273.15;
    }

    // === Build UI ===
    function buildCatTabs() {
        const tabs = document.getElementById('catTabs');
        tabs.innerHTML = '';
        for (const [key, cat] of Object.entries(categories)) {
            const btn = document.createElement('button');
            btn.className = 'cat-tab' + (key === activeCat ? ' active' : '');
            btn.textContent = cat.label;
            btn.dataset.cat = key;
            btn.style.cssText = key === activeCat ? 'border-color:' + cat.color + ';color:' + cat.color + ';background:' + cat.color + '15;' : '';
            btn.addEventListener('click', () => {
                activeCat = key;
                // Set first unit of that category as active
                activeUnit = categories[key].units[0].id;
                updateDialLabel();
                buildCatTabs();
                convert();
            });
            tabs.appendChild(btn);
        }
    }

    function buildDialMenu() {
        const menu = document.getElementById('dialMenu');
        menu.innerHTML = '';
        const cat = categories[activeCat];
        // Show only current category in dial
        const groupLabel = document.createElement('div');
        groupLabel.className = 'dial-group-label';
        groupLabel.textContent = cat.label;
        menu.appendChild(groupLabel);

        cat.units.forEach(u => {
            const item = document.createElement('div');
            item.className = 'dial-item' + (u.id === activeUnit ? ' active' : '');
            item.innerHTML = '<span class="dial-item-symbol">' + u.symbol + '</span>' + u.name;
            item.addEventListener('click', () => {
                activeUnit = u.id;
                updateDialLabel();
                closeMenu();
                convert();
                buildDialMenu();
            });
            menu.appendChild(item);
        });
    }

    function updateDialLabel() {
        const cat = categories[activeCat];
        const unit = cat.units.find(u => u.id === activeUnit);
        document.getElementById('dialLabel').textContent = unit ? unit.symbol : '?';
    }

    // === Dial open/close ===
    const dialBtn = document.getElementById('dialBtn');
    const dialMenu = document.getElementById('dialMenu');

    dialBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = dialMenu.classList.contains('show');
        if (isOpen) { closeMenu(); } else { openMenu(); }
    });

    function openMenu() {
        buildDialMenu();
        dialMenu.classList.add('show');
        dialBtn.classList.add('open');
    }
    function closeMenu() {
        dialMenu.classList.remove('show');
        dialBtn.classList.remove('open');
    }
    document.addEventListener('click', (e) => {
        if (!dialMenu.contains(e.target) && e.target !== dialBtn) closeMenu();
    });

    // === Convert & Render ===
    function convert() {
        const input = document.getElementById('numInput');
        const val = parseFloat(input.value);
        const results = document.getElementById('results');

        if (isNaN(val) || input.value === '') {
            results.innerHTML = '<div class="empty">数値を入力してください</div>';
            return;
        }

        const cat = categories[activeCat];
        const fromUnit = cat.units.find(u => u.id === activeUnit);
        if (!fromUnit) return;

        let html = '';

        // Convert to all units in same category
        const rows = cat.units.map(u => {
            let converted;
            if (cat.base === 'C' && u.special) {
                // Temperature
                converted = tempConvert(val, activeUnit, u.id);
            } else {
                // Standard: input -> base -> target
                const baseVal = val * fromUnit.toBase;
                converted = baseVal / u.toBase;
            }
            return { unit: u, value: converted, isSource: u.id === activeUnit };
        });

        html += '<div class="result-group">';
        html += '<div class="result-group-title" style="color:' + cat.color + '">' + cat.label + '</div>';
        html += '<div class="result-card">';
        rows.forEach(r => {
            const cls = r.isSource ? ' source' : '';
            const valCls = r.isSource ? ' source-val' : '';
            html += '<div class="result-row' + cls + '" onclick="copyValue(\'' + formatNumber(r.value) + ' ' + r.unit.symbol + '\')">';
            html += '<span class="result-unit">' + r.unit.name + '</span>';
            html += '<span class="result-value' + valCls + '">' + formatNumber(r.value) + '</span>';
            html += '<span class="result-symbol">' + r.unit.symbol + '</span>';
            html += '</div>';
        });
        html += '</div></div>';

        results.innerHTML = html;
    }

    // === Format number ===
    function formatNumber(n) {
        if (n === 0) return '0';
        const abs = Math.abs(n);
        if (abs >= 1e15 || (abs < 1e-10 && abs !== 0)) {
            return n.toExponential(6);
        }
        if (abs >= 1e10) return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
        if (abs >= 1) return n.toLocaleString('en-US', { maximumFractionDigits: 6 });
        if (abs >= 0.001) return n.toLocaleString('en-US', { maximumFractionDigits: 8 });
        return n.toExponential(6);
    }

    // === Copy ===
    function copyValue(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast(text + ' をコピー');
        }).catch(() => {});
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // === Input listener ===
    document.getElementById('numInput').addEventListener('input', convert);

    // === Init ===
    buildCatTabs();
    updateDialLabel();
    convert();
    </script>
</body>
</html>
